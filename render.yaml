services:
  - type: web
    name: deepswap-monad-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    # Free plan → no persistent disk. Durability comes from the repo itself:
    # the whale registry DB (backend/whales.db) and the curated JSON ship with
    # every deploy, and loadRoster() re-seeds the registry from them on boot.
    # If you upgrade, add a disk (mountPath /data) + WHALE_DB=/data/whales.db.
    envVars:
      - key: MONAD_RPC
        value: https://rpc.monad.xyz
      - key: WHALE_MIN_USD
        value: 25

  - type: web
    name: deepswap-solana-bot
    env: node
    buildCommand: npm install
    startCommand: npm run start:sol
    rootDir: backend
    envVars:
      - key: SOLANA_RPC
        value: https://api.mainnet-beta.solana.com
      - key: WHALE_MIN_USD
        value: 500
      # ── Real-time whale tracking via Helius webhook (see backend/heliusWebhook.js) ──
      # Set these in the Render dashboard (sync:false = not stored in the repo).
      # PUBLIC_URL is auto-derived from RENDER_EXTERNAL_URL, which Render injects.
      - key: HELIUS_API_KEY        # free-tier key from dashboard.helius.dev
        sync: false
      - key: HELIUS_WEBHOOK_SECRET # any random string — rejects forged webhook POSTs
        sync: false
      # ── Optional extra whale-discovery sources (backend/discoverySources.js) ──
      # Each is gated on its key — set any to activate that source; none = GMGN only.
      - key: BIRDEYE_API_KEY
        sync: false
      - key: SOLANATRACKER_API_KEY
        sync: false
      - key: CIELO_API_KEY
        sync: false
